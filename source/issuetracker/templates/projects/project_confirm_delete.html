{% extends 'partial/project_base.html' %}

{% block content %}
<h2>Удаление проекта</h2>

<div class="card mt-3 border-danger">
    <div class="card-body">
        <p>Вы уверены, что хотите удалить проект?</p>
        <p class="fw-bold">{{ project.title }}</p>
    </div>
</div>

<form method="post" class="mt-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'issuetracker:projects_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
