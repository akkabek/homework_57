{% extends 'tasks/../partial/task_base.html' %}

{% block content %}

<h2>Удаление задачи</h2>

<div class="card mt-3 border-danger">
    <div class="card-body">
        <p>Вы уверены, что хотите удалить задачу?</p>
        <p class="fw-bold">{{ task.summary }}</p>
    </div>
</div>

<form method="post" class="mt-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'project_detail' task.project.pk%}" class="btn btn-secondary">Отмена</a>
</form>

{% endblock %}
