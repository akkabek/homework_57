<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'issuetracker:projects_list' %}">Issue Tracker</a>
        <span class="navbar-brand">{{ request.user }}</span>
        {% if request.user.is_authenticated %}
            <form action="{% url 'accounts:logout' %}" class="btn btn-light" method="POST">
                {% csrf_token %}
                <button class="border-0">Выйти</button>
            </form>
            <a href="{% url 'issuetracker:project_create' %}" class="btn btn-light">+ Проект</a>
        {% else %}
            <a href="{% url 'accounts:login' %}" class="btn btn-light">Войти</a>
            <a class="btn btn-light" href="{% url 'accounts:register' %}?next={{ request.get_full_path }}">Регистрация</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
