{% extends "partial/project_base.html" %}
{% load django_bootstrap5 %}

{% block content %}

<div class="card w-50 mx-auto my-5">
    <div class="card-header">
        <h3>Участники проекта "{{ project.title }}"</h3>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            {% bootstrap_form form %}

            <button type="submit" class="btn btn-primary">
                Сохранить
            </button>
        </form>
    </div>
</div>

{% endblock %}
